<!DOCTYPE html>
<html lang="en">

<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="home.css">
    <link rel="Stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="logo">
            <div class="logo-box">ET</div>
            <div class="logo-hed">Expense Tracker</div>
        </div>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="history.html">History</a></li>
        </ul>
        <div class="user-profile">Welcome <span id="nav-username"></span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>


    <div class="Amount-box">
        <div class="card-balance">
            <div class="card-label">| Net Balance</div>
            <div class="card-value" id="netBalance">Rs. 0.00</div>
        </div>
    </div>
    <div class="Amount-box">
        <div class="card-income">
            <div class="card-label-I">| Total Income</div>
            <div class="card-value" id="totalIncome">Rs. 0.00</div>
        </div>
        <div class="card-expense">
            <div class="card-label-E">| Total Expenses</div>
            <div class="card-value" id="totalExpense">Rs. 0.00</div>
        </div>
    </div>

    <!--Transaction Form-->
    <div class="form-box" id="home">
        <h1><span>|</span> Add Transaction</h1>
        <div class="form">
            <div class="selection-btn">
                <button class="income-btn active-income" id="btn-income" onclick="selectType('income')">▲
                    Income</button>
                <button class="expense-btn " id="btn-expense" onclick="selectType('expense')">▼ Expense</button>
            </div>
            <div class="form-group">
                <label>Amount (Rs.)</label>
                <input type="number" id="amount" placeholder="e.g. 1000" />
                <span class="error" id="amount-empty"></span>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="e.g. Income, Food or Something.." />
                <span class="error" id="description-empty"></span>
            </div>
        </div>
        <div class="btn-submit">
            <button class="add-btn-income" id="add-btn" onclick="addTransaction()">+ Add Income</button>
        </div>
    </div>

    <script src="home.js"></script>
</body>

</html>
